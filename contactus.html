<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>
body{
  font-family: Arial, sans-serif;
  background:#DFEAF2;
  margin:0;
  overflow:hidden; /* no scroll on large screens */
}

/* Navbar untouched – default Bootstrap color */
.navbar{
  height:56px;
}

/* Section layout */
.contact-section{
  height:calc(100vh - 56px);
  display:flex;
  align-items:center;
}

/* Left content text */
.section-label{
  font-weight:600;
  letter-spacing:2px;
  font-size:13px;
  color:#555;
}

.contact-left h2{
  font-weight:700;
  margin:10px 0;
}

.contact-left p{
  margin:4px 0;
  color:#333;
  font-size:15px;
}

/* Form card */
.contact-card{
  background:#f7f7f7;
  padding:30px;
  border-radius:8px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.contact-card label{
  font-weight:600;
  font-size:14px;
}

.contact-card input,
.contact-card textarea{
  background:#eee;
  border:none;
  border-radius:4px;
  padding:10px;
}

.contact-card textarea{
  resize:none;
  height:90px;
}

.btn-submit{
  background:#FF9878;
  border:none;
  padding:12px;
  font-weight:600;
  width:100%;
}

/* Mobile behavior */
@media (max-width:768px){

  body{
    overflow:auto; /* allow scroll on mobile */
  }

  .contact-section{
    height:auto;
    padding:20px 0;
    align-items:flex-start;
  }

  .contact-left{
    text-align:center;
    margin-bottom:20px;
  }

  .contact-left h2{
    font-size:20px;
  }

  .contact-card{
    padding:20px;
  }

  .form-row{
    flex-direction:column;
  }
}
</style>
</head>

<body>


<nav class="navbar navbar-expand-sm bg-light fixed-top">
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#myNav">
        ☰
    </button>

    <div id="myNav" class="collapse navbar-collapse">
        <ul class="navbar-nav">  
            <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="About us.html" class="nav-link">About us</a></li>
            <li class="nav-item"><a href="Exploreplaces.html" class="nav-link">Explore places</a></li>
            <li class="nav-item"><a href="packages.html" class="nav-link">packages</a></li>
            <li class="nav-item"><a href="contactus.html" class="nav-link">Contact</a></li>
        </ul>
    </div>
</nav>

<!-- Contact Section -->
<section class="contact-section">
  <div class="container">
    <div class="row align-items-center">

      <!-- Left -->
      <div class="col-md-6 contact-left mb-4">
        <span class="section-label">CONTACT INFORMATION</span>
        <h2>Let’s get in touch</h2>
        <p><strong>Address:</strong> Hyderabad</p>
        <p><strong>Email:</strong> thedestination27@gmail.com</p>
        <p><strong>Phone:</strong> +91 95227 95727</p>
      </div>

      <!-- Right -->
      <div class="col-md-6">
        <div class="contact-card">
          <form>
            <div class="form-row">
              <div class="form-group col-md-6">
                <label>Name</label>
                <input type="text" class="form-control" placeholder="Name">
              </div>
              <div class="form-group col-md-6">
                <label>Phone</label>
                <input type="text" class="form-control" placeholder="Phone">
              </div>
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" class="form-control" placeholder="Email">
            </div>

            <div class="form-group">
              <label>Message</label>
              <textarea class="form-control" placeholder="Message"></textarea>
            </div>

            <button class="btn btn-submit">Submit</button>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
